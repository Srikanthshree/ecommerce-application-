# =============================================================================
# nginx.local.conf — local Docker Compose configuration
#
# Proxies /health and /api/ to the catalog container.
# Used only for local testing via docker-compose.
# =============================================================================

worker_processes      auto;
error_log             /var/log/nginx/error.log warn;
pid                   /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include           /etc/nginx/mime.types;
    default_type      application/octet-stream;

    # Use /tmp for all nginx write paths (non-root user in container)
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path       /tmp/nginx_proxy;
    fastcgi_temp_path     /tmp/nginx_fastcgi;
    uwsgi_temp_path       /tmp/nginx_uwsgi;
    scgi_temp_path        /tmp/nginx_scgi;

    server_tokens     off;

    log_format main   '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent"';

    access_log        /var/log/nginx/access.log main;

    sendfile          on;
    tcp_nopush        on;
    keepalive_timeout 65;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    server {
        listen      8080;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        add_header X-Frame-Options         "DENY"                              always;
        add_header X-Content-Type-Options  "nosniff"                           always;
        add_header X-XSS-Protection        "1; mode=block"                     always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"   always;

        # ── Proxy: health check ─────────────────────────────────────────────
        location = /health {
            proxy_pass         http://catalog:8000/health;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_read_timeout 10s;
            access_log         off;
        }

        # ── Proxy: REST API ─────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://catalog:8000/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_read_timeout 30s;
        }

        # ── Proxy: FastAPI auto-docs (handy for local testing) ──────────────
        location /docs {
            proxy_pass         http://catalog:8000/docs;
            proxy_set_header   Host $host;
        }

        location /openapi.json {
            proxy_pass         http://catalog:8000/openapi.json;
            proxy_set_header   Host $host;
        }

        # ── SPA fallback ────────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Long-lived cache for hashed static assets ────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            access_log  off;
        }

        error_page 404 /index.html;
    }
}
