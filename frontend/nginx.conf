# =============================================================================
# nginx.conf — hardened production configuration for the React SPA
#
# - Runs on port 8080 (non-privileged, matches the non-root USER in the image)
# - server_tokens off hides the nginx version string
# - All security headers are set in every response
# - Static assets served with long-lived cache headers + immutable flag
# =============================================================================

worker_processes      auto;
error_log             /var/log/nginx/error.log warn;
pid                   /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include           /etc/nginx/mime.types;
    default_type      application/octet-stream;

    # Never advertise the nginx version
    server_tokens     off;

    log_format main   '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent"';

    access_log        /var/log/nginx/access.log main;

    sendfile          on;
    tcp_nopush        on;
    keepalive_timeout 65;

    # Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    server {
        listen      8080;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # ── Security headers applied to every response ──────────────────────
        add_header Strict-Transport-Security
            "max-age=31536000; includeSubDomains; preload"             always;
        add_header X-Frame-Options             "DENY"                  always;
        add_header X-Content-Type-Options      "nosniff"               always;
        add_header X-XSS-Protection            "1; mode=block"         always;
        add_header Referrer-Policy
            "strict-origin-when-cross-origin"                          always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none';"
                                                                       always;
        add_header Permissions-Policy
            "camera=(), microphone=(), geolocation=()"                 always;

        # ── Health endpoint (used by nginx Dockerfile HEALTHCHECK) ──────────
        location = /health {
            access_log  off;
            add_header  Content-Type application/json;
            return      200 '{"status":"ok"}';
        }

        # ── SPA fallback — send all paths to index.html ─────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Long-lived cache for hashed static assets ────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            access_log  off;
        }

        error_page 404 /index.html;
    }
}
