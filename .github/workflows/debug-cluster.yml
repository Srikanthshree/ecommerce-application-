name: debug-cluster

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (assume role)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: CoreDNS and kube-dns checks
        run: |
          kubectl -n kube-system get pods -o wide -l k8s-app=kube-dns || true
          kubectl -n kube-system logs -l k8s-app=kube-dns --tail=200 || true
          kubectl -n kube-system get pods -o wide -l k8s-app=coredns || true
          kubectl -n kube-system logs -l k8s-app=coredns --tail=200 || true
          kubectl -n kube-system get endpoints kube-dns -o yaml || true
          kubectl -n kube-system describe configmap coredns || true

      - name: Run DNS + HTTPS checks from inside cluster (netshoot)
        run: |
          cat <<'EOF' > debug-pod.yaml
          apiVersion: v1
          kind: Pod
          metadata:
            name: debug
            namespace: ecommerce
          spec:
            restartPolicy: Never
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              seccompProfile:
                type: RuntimeDefault
            containers:
            - name: debug
              image: nicolaka/netshoot
              command: ["sleep", "300"]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile:
                  type: RuntimeDefault
          EOF

          kubectl apply -f debug-pod.yaml || true

          # Wait for pod to be Running and container to be ready (max ~180s)
          ready=0
          for i in {1..36}; do
            phase=$(kubectl -n ecommerce get pod debug -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            contready=$(kubectl -n ecommerce get pod debug -o jsonpath='{.status.containerStatuses[0].ready}' 2>/dev/null || echo "false")
            if [ "${phase}" = "Running" ] && [ "${contready}" = "true" ]; then
              ready=1
              break
            fi
            sleep 5
          done

          if [ "$ready" = "1" ]; then
            kubectl -n ecommerce exec debug -- /bin/bash -lc "dig +short sts.${{ secrets.AWS_REGION }}.amazonaws.com || true; dig +short secretsmanager.${{ secrets.AWS_REGION }}.amazonaws.com || true; curl -sS -D- https://sts.${{ secrets.AWS_REGION }}.amazonaws.com -o /dev/null || true; curl -sS -D- https://secretsmanager.${{ secrets.AWS_REGION }}.amazonaws.com -o /dev/null || true"
            kubectl -n ecommerce delete pod debug --wait=false || true
            rm -f debug-pod.yaml || true
          else
            echo "Pod did not become ready within timeout. Collecting diagnostics..."
            kubectl -n ecommerce describe pod debug || true
            kubectl -n ecommerce get pod debug -o yaml || true
            kubectl -n ecommerce get events -n ecommerce --sort-by='.lastTimestamp' || true
            kubectl -n ecommerce logs pod/debug --all-containers --tail=200 || true

            # Try a lightweight fallback pod (curlimages) which often pulls faster
            cat <<'EOF' > debug-fallback.yaml
            apiVersion: v1
            kind: Pod
            metadata:
              name: debug-fallback
              namespace: ecommerce
            spec:
              restartPolicy: Never
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile:
                  type: RuntimeDefault
              containers:
              - name: curl
                image: curlimages/curl:8.8.1
                command: ["sleep", "30"]
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
                  runAsNonRoot: true
                  runAsUser: 1000
                  seccompProfile:
                    type: RuntimeDefault
            EOF

            kubectl apply -f debug-fallback.yaml || true
            kubectl -n ecommerce wait --for=condition=Ready pod/debug-fallback --timeout=60s || true
            kubectl -n ecommerce exec debug-fallback -- /bin/sh -lc "curl -sS -D- https://sts.${{ secrets.AWS_REGION }}.amazonaws.com -o /dev/null || true; curl -sS -D- https://secretsmanager.${{ secrets.AWS_REGION }}.amazonaws.com -o /dev/null || true" || true
            kubectl -n ecommerce delete pod debug-fallback --wait=false || true
            kubectl -n ecommerce delete pod debug --wait=false || true
            rm -f debug-pod.yaml debug-fallback.yaml || true
          fi

      - name: Collect backend & catalog logs
        run: |
          kubectl -n ecommerce logs -l app=backend --tail=300 > backend-logs.txt || true
          kubectl -n ecommerce logs -l app=catalog --tail=300 > catalog-logs.txt || true

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: backend-logs.txt,catalog-logs.txt
