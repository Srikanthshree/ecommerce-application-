name: debug-cluster

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Checkout code (get latest manifests)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fix CoreDNS - use VPC DNS resolver (10.0.0.2), NOT kube-dns itself
        run: |
          echo "=== Current CoreDNS config ==="
          kubectl get configmap coredns -n kube-system -o jsonpath='{.data.Corefile}'
          
          echo ""
          echo "=== Patching CoreDNS to forward to VPC DNS 10.0.0.2 (NOT 172.20.0.10 which is CoreDNS itself) ==="
          # 172.20.0.10 = kube-dns ClusterIP = CoreDNS itself → causes loop crash
          # 10.0.0.2 = VPC base CIDR +2 = Amazon VPC DNS resolver → correct upstream
          # Also removing 'loop' plugin to prevent false loop detection during restart
          # Write Corefile to /tmp first — avoids YAML indentation conflict
          # (Corefile content has 4-space indent; YAML block needs 10-space min)
          COREFILE='.:53 {\n    errors\n    health {\n        lameduck 5s\n    }\n    ready\n    kubernetes cluster.local in-addr.arpa ip6.arpa {\n      pods insecure\n      fallthrough in-addr.arpa ip6.arpa\n    }\n    prometheus :9153\n    forward . 10.0.0.2\n    cache 30\n    reload\n    loadbalance\n}'
          printf '%b\n' "$COREFILE" > /tmp/Corefile

          echo ""
          echo "=== Applying new CoreDNS config (VPC DNS 10.0.0.2, removed loop plugin) ==="
          kubectl -n kube-system create configmap coredns \
            --from-file=Corefile=/tmp/Corefile \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo ""
          echo "=== Verified new CoreDNS config ==="
          kubectl get configmap coredns -n kube-system -o jsonpath='{.data.Corefile}'
          
          echo ""
          echo "=== Force restart CoreDNS ==="
          kubectl rollout restart deployment/coredns -n kube-system
          kubectl wait --for=condition=available --timeout=90s deployment/coredns -n kube-system || true
          sleep 10
          
          echo ""
          echo "=== CoreDNS pods - should be Running (not CrashLoopBackOff) ==="
          kubectl get pods -n kube-system -l k8s-app=kube-dns -o wide
          kubectl -n kube-system logs -l k8s-app=kube-dns --tail=20 || true

      - name: Ensure backend-secrets + fix ServiceAccount IRSA annotations + patch deployments
        run: |
          # ── Step 1: Create backend-secrets K8s Secret (idempotent) ─────────────────
          # Both backend and catalog read DB_SECRET_ARN from this secret.
          # If it doesn't exist, pods fail at container creation (CreateContainerConfigError).
          echo "=== Ensuring backend-secrets K8s Secret exists ==="
          kubectl -n ecommerce create secret generic backend-secrets \
            --from-literal=db_secret_arn="arn:aws:secretsmanager:us-east-1:986314681697:secret:ecommerce/prod/db-credentials-upNQ1r" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "backend-secrets secret: OK"

          # ── Step 2: Fix ServiceAccount IRSA annotations ──────────────────────────
          # Both backend-service.yaml and catalog-deployment.yaml have the literal
          # placeholder "IRSA_ROLE_ARN" as the eks.amazonaws.com/role-arn annotation.
          # The EKS pod identity webhook reads this annotation and INJECTS AWS_ROLE_ARN
          # into the pod env — overriding (as the last value wins) any correct value
          # already set in the Deployment spec. Fix both SAs before the rollout.
          echo ""
          echo "=== Fixing ServiceAccount IRSA annotations (was literal 'IRSA_ROLE_ARN' placeholder) ==="
          kubectl -n ecommerce annotate serviceaccount backend \
            eks.amazonaws.com/role-arn=arn:aws:iam::986314681697:role/ecommerce-app-irsa-role \
            --overwrite
          kubectl -n ecommerce annotate serviceaccount catalog \
            eks.amazonaws.com/role-arn=arn:aws:iam::986314681697:role/ecommerce-app-irsa-role \
            --overwrite
          echo "ServiceAccount annotations: OK"
          kubectl -n ecommerce get serviceaccount backend catalog -o jsonpath='{range .items[*]}{.metadata.name}{": "}{.metadata.annotations.eks\.amazonaws\.com/role-arn}{"\n"}{end}'

          # ── Step 3: Preserve running images ──────────────────────────────────────
          echo ""
          echo "=== Current running images (these will NOT be touched) ==="
          kubectl -n ecommerce get deployment backend -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo ""
          kubectl -n ecommerce get deployment catalog -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo ""

          # ── Step 4: Remove readOnlyRootFilesystem if present ─────────────────────
          # (blocks Python multiprocessing in catalog; safe to remove for both)
          kubectl -n ecommerce patch deployment backend --type=json -p='[
            {"op":"remove","path":"/spec/template/spec/containers/0/securityContext/readOnlyRootFilesystem"}
          ]' 2>/dev/null || echo 'readOnlyRootFilesystem already absent from backend — OK'
          kubectl -n ecommerce patch deployment catalog --type=json -p='[
            {"op":"remove","path":"/spec/template/spec/containers/0/securityContext/readOnlyRootFilesystem"}
          ]' 2>/dev/null || echo 'readOnlyRootFilesystem already absent from catalog — OK'

          # ── Step 5: Set IRSA env vars (kubectl set env replaces, never duplicates) ─
          # Using set env instead of json-patch op:add prevents duplicate env entries
          # that accumulate on repeated pipeline runs (duplicates cause the last value
          # to win — which was wrong when op:add kept appending IRSA_ROLE_ARN).
          echo ""
          echo "=== Setting IRSA env vars via kubectl set env (idempotent, no duplicates) ==="
          kubectl -n ecommerce set env deployment/backend \
            AWS_ROLE_ARN=arn:aws:iam::986314681697:role/ecommerce-app-irsa-role \
            AWS_WEB_IDENTITY_TOKEN_FILE=/var/run/secrets/eks.amazonaws.com/serviceaccount/token \
            AWS_STS_REGIONAL_ENDPOINTS=regional
          kubectl -n ecommerce set env deployment/catalog \
            AWS_ROLE_ARN=arn:aws:iam::986314681697:role/ecommerce-app-irsa-role \
            AWS_WEB_IDENTITY_TOKEN_FILE=/var/run/secrets/eks.amazonaws.com/serviceaccount/token \
            AWS_STS_REGIONAL_ENDPOINTS=regional
          # Note: kubectl set env already triggers a rollout; explicit restart below
          # ensures SA annotation change (step 2) is also picked up in the new pods.
          echo ""
          echo "=== Force rollout restart (ensures SA annotation fix is in effect) ==="
          kubectl rollout restart deployment/backend deployment/catalog -n ecommerce

          echo ""
          echo "=== Waiting 120 seconds for pods to start ==="
          sleep 120

          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n ecommerce -o wide

          echo ""
          echo "=== Verify IRSA env vars (should show exactly ONE entry for each, correct ARN) ==="
          echo "Backend AWS_ROLE_ARN:"
          kubectl -n ecommerce get deployment backend -o jsonpath='{.spec.template.spec.containers[0].env}' | tr ',' '\n' | grep -A2 AWS_ROLE_ARN
          echo ""
          echo "Catalog AWS_ROLE_ARN:"
          kubectl -n ecommerce get deployment catalog -o jsonpath='{.spec.template.spec.containers[0].env}' | tr ',' '\n' | grep -A2 AWS_ROLE_ARN

      - name: CoreDNS and kube-dns checks
        run: |
          kubectl -n kube-system get pods -o wide -l k8s-app=kube-dns || true
          kubectl -n kube-system logs -l k8s-app=kube-dns --tail=200 || true
          kubectl -n kube-system get pods -o wide -l k8s-app=coredns || true
          kubectl -n kube-system logs -l k8s-app=coredns --tail=200 || true
          kubectl -n kube-system get endpoints kube-dns -o yaml || true
          kubectl -n kube-system describe configmap coredns || true

      - name: Run DNS + HTTPS checks from inside cluster (debug)
        run: |
          # Get a REAL running image from cluster (frontend is always running)
          IMAGE=$(kubectl -n ecommerce get pods -l app=frontend --field-selector=status.phase=Running -o jsonpath='{.items[0].spec.containers[0].image}' 2>/dev/null || true)
          if [ -z "$IMAGE" ] || echo "$IMAGE" | grep -q "ACCOUNT_ID"; then
            IMAGE=$(kubectl -n ecommerce get pods -l app=backend --field-selector=status.phase=Running -o jsonpath='{.items[0].spec.containers[0].image}' 2>/dev/null || true)
          fi
          if [ -z "$IMAGE" ] || echo "$IMAGE" | grep -q "ACCOUNT_ID"; then
            IMAGE=$(kubectl -n ecommerce get pods -o jsonpath='{.items[*].spec.containers[0].image}' 2>/dev/null | tr ' ' '\n' | grep -v "ACCOUNT_ID" | grep "amazonaws.com" | head -1 || true)
          fi
          if [ -z "$IMAGE" ] || echo "$IMAGE" | grep -q "ACCOUNT_ID"; then
            echo "No valid ECR image found. Skipping debug pod. Check pod status above."
            exit 0
          fi
          echo "Using image: $IMAGE"

          kubectl -n ecommerce delete pod debug debug-fallback --ignore-not-found --wait=false || true

          overrides=$(printf '{"apiVersion":"v1","kind":"Pod","metadata":{"name":"debug"},"spec":{"restartPolicy":"Never","securityContext":{"runAsNonRoot":true,"runAsUser":1000,"seccompProfile":{"type":"RuntimeDefault"}},"containers":[{"name":"debug","image":"%s","command":["sh","-c","sleep 300"],"securityContext":{"allowPrivilegeEscalation":false,"capabilities":{"drop":["ALL"]},"runAsNonRoot":true,"runAsUser":1000,"seccompProfile":{"type":"RuntimeDefault"}}}]}}' "$IMAGE")
          kubectl -n ecommerce run debug --image="$IMAGE" --restart=Never --overrides "$overrides" --command -- sleep 300 || true

          # Wait up to 180s for pod/container ready
          ready=0
          for i in {1..36}; do
            phase=$(kubectl -n ecommerce get pod debug -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            contready=$(kubectl -n ecommerce get pod debug -o jsonpath='{.status.containerStatuses[0].ready}' 2>/dev/null || echo "false")
            if [ "${phase}" = "Running" ] && [ "${contready}" = "true" ]; then
              ready=1
              break
            fi
            sleep 5
          done

          if [ "$ready" = "1" ]; then
            echo "Debug pod is Running. Attempting network checks from debug pod..."
            kubectl -n ecommerce exec debug -- sh -c "cat /etc/resolv.conf || true; (which dig >/dev/null 2>&1 && dig +short sts.${{ secrets.AWS_REGION }}.amazonaws.com) || true; (which curl >/dev/null 2>&1 && curl -sS -D- https://sts.${{ secrets.AWS_REGION }}.amazonaws.com -o /dev/null) || true" || true
            kubectl -n ecommerce delete pod debug --wait=false || true
          else
            echo "Pod did not become ready within timeout. Collecting diagnostics..."
            kubectl -n ecommerce describe pod debug || true
            kubectl -n ecommerce get pod debug -o yaml || true
            kubectl -n ecommerce get events -n ecommerce --sort-by='.lastTimestamp' || true
            kubectl -n ecommerce logs pod/debug --all-containers --tail=200 || true

            # Try execing into an existing running pod (backend/catalog/frontend) to run network checks
            for SVC in backend catalog frontend; do
              POD=$(kubectl -n ecommerce get pods -l app=$SVC -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
              if [ -n "$POD" ]; then
                echo "Attempting network checks from pod $POD (app=$SVC)..."
                kubectl -n ecommerce exec "$POD" -- sh -c "cat /etc/resolv.conf || true; (which dig >/dev/null 2>&1 && dig +short sts.${{ secrets.AWS_REGION }}.amazonaws.com) || true; (which curl >/dev/null 2>&1 && curl -sS -D- https://sts.${{ secrets.AWS_REGION }}.amazonaws.com -o /dev/null) || true" || true
              fi
            done

            # Launch a fallback pod using the same ECR image to run simple checks
            echo "Launching fallback pod (using same image) to run simple checks..."
            overrides_fb=$(printf '{"apiVersion":"v1","kind":"Pod","metadata":{"name":"debug-fallback"},"spec":{"restartPolicy":"Never","securityContext":{"runAsNonRoot":true,"runAsUser":1000,"seccompProfile":{"type":"RuntimeDefault"}},"containers":[{"name":"fallback","image":"%s","command":["sh","-c","sleep 30"],"securityContext":{"allowPrivilegeEscalation":false,"capabilities":{"drop":["ALL"]},"runAsNonRoot":true,"runAsUser":1000,"seccompProfile":{"type":"RuntimeDefault"}}}]}}' "$IMAGE")
            kubectl -n ecommerce run debug-fallback --image="$IMAGE" --restart=Never --overrides "$overrides_fb" --command -- sleep 30 || true
            kubectl -n ecommerce wait --for=condition=Ready pod/debug-fallback --timeout=60s || true
            kubectl -n ecommerce exec debug-fallback -- sh -c "cat /etc/resolv.conf || true; (which curl >/dev/null 2>&1 && curl -sS -D- https://sts.${{ secrets.AWS_REGION }}.amazonaws.com -o /dev/null) || true" || true
            kubectl -n ecommerce delete pod debug-fallback --wait=false || true
            kubectl -n ecommerce delete pod debug --wait=false || true
          fi

      - name: Collect backend & catalog logs + full diagnostics
        run: |
          echo "=== Backend Pod Logs ==="
          kubectl -n ecommerce logs -l app=backend --tail=500 --all-containers=true > backend-logs.txt 2>&1 || true
          cat backend-logs.txt
          
          echo ""
          echo "=== Catalog Pod Logs ==="
          kubectl -n ecommerce logs -l app=catalog --tail=500 --all-containers=true > catalog-logs.txt 2>&1 || true
          cat catalog-logs.txt
          
          echo ""
          echo "=== Backend Pod Describe (with events) ==="
          kubectl -n ecommerce describe pod -l app=backend > backend-describe.txt 2>&1 || true
          cat backend-describe.txt
          
          echo ""
          echo "=== Catalog Pod Describe (with events) ==="
          kubectl -n ecommerce describe pod -l app=catalog > catalog-describe.txt 2>&1 || true
          cat catalog-describe.txt
          
          echo ""
          echo "=== All Ecommerce Events ==="
          kubectl -n ecommerce get events --sort-by='.lastTimestamp' > ecommerce-events.txt 2>&1 || true
          cat ecommerce-events.txt
          
          echo ""
          echo "=== Backend Startup Probe Status ==="
          kubectl -n ecommerce get pod -l app=backend -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.containerStatuses[0].state}{"\n"}{end}' > backend-probe-status.txt 2>&1 || true
          cat backend-probe-status.txt
          
          echo ""
          echo "=== Catalog Startup Probe Status ==="
          kubectl -n ecommerce get pod -l app=catalog -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.containerStatuses[0].state}{"\n"}{end}' > catalog-probe-status.txt 2>&1 || true
          cat catalog-probe-status.txt
          
          # Ensure files exist so artifact upload sees them
          touch backend-logs.txt catalog-logs.txt backend-describe.txt catalog-describe.txt ecommerce-events.txt backend-probe-status.txt catalog-probe-status.txt || true

      - name: Check IRSA credentials and environment from running pods
        run: |
          echo "=== Checking IRSA token file and credentials from backend pod ==="
          BACKEND_POD=$(kubectl -n ecommerce get pods -l app=backend -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$BACKEND_POD" ]; then
            echo "Backend pod: $BACKEND_POD"
            
            echo "IRSA token file check:"
            kubectl -n ecommerce exec "$BACKEND_POD" -- sh -c "test -f /var/run/secrets/eks.amazonaws.com/serviceaccount/token && echo 'Token file exists' && head -c 50 /var/run/secrets/eks.amazonaws.com/serviceaccount/token && echo '...' || echo 'Token file NOT found'" 2>&1 || true
            
            echo ""
            echo "Environment variables (AWS_ROLE_ARN, AWS_WEB_IDENTITY_TOKEN_FILE):"
            kubectl -n ecommerce exec "$BACKEND_POD" -- sh -c 'echo "AWS_ROLE_ARN: $AWS_ROLE_ARN"; echo "AWS_WEB_IDENTITY_TOKEN_FILE: $AWS_WEB_IDENTITY_TOKEN_FILE"; echo "AWS_REGION: $AWS_REGION"' 2>&1 || true
            
            echo ""
            echo "ServiceAccount token claim:"
            kubectl -n ecommerce exec "$BACKEND_POD" -- sh -c 'cat /var/run/secrets/eks.amazonaws.com/serviceaccount/token | cut -d. -f2 | base64 -d 2>/dev/null | head -c 200' 2>&1 || true
            
          else
            echo "No backend pod found"
          fi
          
          echo ""
          echo "=== Checking IRSA token file and credentials from catalog pod ==="
          CATALOG_POD=$(kubectl -n ecommerce get pods -l app=catalog -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$CATALOG_POD" ]; then
            echo "Catalog pod: $CATALOG_POD"
            
            echo "IRSA token file check:"
            kubectl -n ecommerce exec "$CATALOG_POD" -- sh -c "test -f /var/run/secrets/eks.amazonaws.com/serviceaccount/token && echo 'Token file exists' && head -c 50 /var/run/secrets/eks.amazonaws.com/serviceaccount/token && echo '...' || echo 'Token file NOT found'" 2>&1 || true
            
            echo ""
            echo "Environment variables (AWS_ROLE_ARN, AWS_WEB_IDENTITY_TOKEN_FILE):"
            kubectl -n ecommerce exec "$CATALOG_POD" -- sh -c 'echo "AWS_ROLE_ARN: $AWS_ROLE_ARN"; echo "AWS_WEB_IDENTITY_TOKEN_FILE: $AWS_WEB_IDENTITY_TOKEN_FILE"; echo "AWS_REGION: $AWS_REGION"' 2>&1 || true
          else
            echo "No catalog pod found"
          fi

      - name: Check VPC endpoints and network connectivity
        run: |
          echo "=== Checking VPC endpoints status ==="
          aws ec2 describe-vpc-endpoints \
            --filters "Name=tag:Name,Values=ecommerce-*-endpoint" \
            --query 'VpcEndpoints[*].[ServiceName,State,Tags[?Key==`Name`].Value|[0]]' \
            --output table \
            --region ${{ secrets.AWS_REGION }} || true
          
          echo ""
          echo "=== Testing DNS resolution to AWS services from backend pod ==="
          BACKEND_POD=$(kubectl -n ecommerce get pods -l app=backend -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$BACKEND_POD" ]; then
            kubectl -n ecommerce exec "$BACKEND_POD" -- sh -c 'nslookup sts.us-east-1.amazonaws.com || getent hosts sts.us-east-1.amazonaws.com' 2>&1 || true
            kubectl -n ecommerce exec "$BACKEND_POD" -- sh -c 'nslookup secretsmanager.us-east-1.amazonaws.com || getent hosts secretsmanager.us-east-1.amazonaws.com' 2>&1 || true
          fi
          
          echo ""
          echo "=== Testing DNS resolution from catalog pod ==="
          CATALOG_POD=$(kubectl -n ecommerce get pods -l app=catalog -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$CATALOG_POD" ]; then
            kubectl -n ecommerce exec "$CATALOG_POD" -- sh -c 'nslookup sts.us-east-1.amazonaws.com || getent hosts sts.us-east-1.amazonaws.com' 2>&1 || true
          fi

      - name: Check CoreDNS status and logs (detailed)
        run: |
          echo "=== CoreDNS Pods Status ==="
          kubectl -n kube-system get pods -l k8s-app=coredns -o wide
          
          echo ""
          echo "=== CoreDNS Resource Requests/Limits ==="
          kubectl -n kube-system get pods -l k8s-app=coredns -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.containers[0].resources}{"\n"}{end}'
          
          echo ""
          echo "=== CoreDNS Logs (last 200 lines) ==="
          kubectl -n kube-system logs -l k8s-app=coredns --tail=200 --all-containers=true | tee coredns-logs.txt
          
          echo ""
          echo "=== CoreDNS ConfigMap ==="
          kubectl -n kube-system get configmap coredns -o yaml | tee coredns-config.txt

      - name: Deep DNS Debugging - CoreDNS Upstream & Pod Resolution
        run: |
          echo "=== CoreDNS Pod /etc/resolv.conf (upstream DNS) ==="
          COREDNS_POD=$(kubectl -n kube-system get pods -l k8s-app=coredns -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$COREDNS_POD" ]; then
            echo "CoreDNS Pod: $COREDNS_POD"
            kubectl -n kube-system exec "$COREDNS_POD" -- cat /etc/resolv.conf 2>&1 || echo "Could not read resolv.conf from CoreDNS pod"
          fi
          
          echo ""
          echo "=== DNS Query Test: sts.us-east-1.amazonaws.com from Backend Pod ==="
          BACKEND_POD=$(kubectl -n ecommerce get pods -l app=backend -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$BACKEND_POD" ]; then
            echo "Backend Pod: $BACKEND_POD"
            echo "nslookup output:"
            kubectl -n ecommerce exec "$BACKEND_POD" -- sh -c 'nslookup sts.us-east-1.amazonaws.com 2>&1' || echo "nslookup failed or not available"
            echo ""
            echo "getent hosts output:"
            kubectl -n ecommerce exec "$BACKEND_POD" -- sh -c 'getent hosts sts.us-east-1.amazonaws.com 2>&1' || echo "getent failed"
          fi
          
          echo ""
          echo "=== DNS Query Test: secretsmanager.us-east-1.amazonaws.com from Backend Pod ==="
          if [ -n "$BACKEND_POD" ]; then
            echo "nslookup output:"
            kubectl -n ecommerce exec "$BACKEND_POD" -- sh -c 'nslookup secretsmanager.us-east-1.amazonaws.com 2>&1' || echo "nslookup failed"
            echo ""
            echo "getent hosts output:"
            kubectl -n ecommerce exec "$BACKEND_POD" -- sh -c 'getent hosts secretsmanager.us-east-1.amazonaws.com 2>&1' || echo "getent failed"
          fi
          
          echo ""
          echo "=== DNS Query Test: sts.us-east-1.amazonaws.com from Catalog Pod ==="
          CATALOG_POD=$(kubectl -n ecommerce get pods -l app=catalog -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$CATALOG_POD" ]; then
            echo "Catalog Pod: $CATALOG_POD"
            echo "nslookup output:"
            kubectl -n ecommerce exec "$CATALOG_POD" -- sh -c 'nslookup sts.us-east-1.amazonaws.com 2>&1' || echo "nslookup failed or not available"
          fi
          
          echo ""
          echo "=== Verify CoreDNS Forward Configuration ==="
          echo "Checking if CoreDNS is configured to forward to EKS private Route 53 (172.20.0.10):"
          kubectl -n kube-system get configmap coredns -o jsonpath='{.data.Corefile}' | grep -A 5 "forward"
          
          echo ""
          echo "=== Pod DNS Configuration (/etc/resolv.conf from Backend) ==="
          if [ -n "$BACKEND_POD" ]; then
            kubectl -n ecommerce exec "$BACKEND_POD" -- cat /etc/resolv.conf 2>&1 || echo "Could not read resolv.conf"
          fi
          
          echo ""
          echo "=== Test direct connectivity to VPC endpoint IPs (if resolvable) ==="
          if [ -n "$BACKEND_POD" ]; then
            echo "Attempting to resolve and test connectivity to STS endpoint:"
            kubectl -n ecommerce exec "$BACKEND_POD" -- sh -c '
              STS_IP=$(getent hosts sts.us-east-1.amazonaws.com | awk "{print \$1}" | head -1 || echo "")
              if [ -n "$STS_IP" ]; then
                echo "STS resolved to: $STS_IP"
                (timeout 5 sh -c "echo \"\" >/dev/tcp/$STS_IP/443" && echo "Port 443 reachable") || echo "Port 443 not reachable (expected if SG blocks)"
              else
                echo "Could not resolve STS IP"
              fi
            ' 2>&1 || true
          fi

      - name: Check network policies and security groups
        run: |
          echo "=== Network Policies in ecommerce namespace ==="
          kubectl -n ecommerce get networkpolicies -o wide 2>&1 || echo "No network policies found"
          
          echo ""
          echo "=== Service Accounts in ecommerce ==="
          kubectl -n ecommerce get serviceaccounts -o wide
          
          echo ""
          echo "=== Backend ServiceAccount (with IRSA annotation) ==="
          kubectl -n ecommerce get serviceaccount backend -o yaml | tee backend-sa.txt
          
          echo ""
          echo "=== Catalog ServiceAccount (with IRSA annotation) ==="
          kubectl -n ecommerce get serviceaccount catalog -o yaml | tee catalog-sa.txt

      - name: Check pod startup probe configuration (YAML)
        run: |
          echo "=== Backend Deployment startupProbe Configuration ==="
          kubectl -n ecommerce get deployment backend -o jsonpath='{.spec.template.spec.containers[0].startupProbe}' | tee backend-startup-probe.txt
          
          echo ""
          echo "=== Catalog Deployment startupProbe Configuration ==="
          kubectl -n ecommerce get deployment catalog -o jsonpath='{.spec.template.spec.containers[0].startupProbe}' | tee catalog-startup-probe.txt

      - name: Upload all diagnostic logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cluster-diagnostics
          path: |
            backend-logs.txt
