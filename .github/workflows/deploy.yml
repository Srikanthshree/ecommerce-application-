# =============================================================================
# Application CI/CD — ecommerce-app
#
# Authentication:  AWS OIDC — no static IAM keys anywhere.
# Security gates:  Trivy scans source, then each container image.
#                  ANY CRITICAL/HIGH finding blocks the pipeline.
# Flow:
#   1. code-scan      — Trivy FS scan (secrets + vulns + misconfigs)
#   2. build-and-scan — build images, Trivy image scan, push to ECR
#   3. deploy         — update EKS with zero-downtime rolling update
# =============================================================================

name: "Application CI/CD"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  id-token: write          # required for OIDC authentication to AWS
  security-events: write   # required for Trivy SARIF uploads

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION:       "us-east-1"
  EKS_CLUSTER_NAME: "ecommerce-eks"

# =============================================================================
# Job 1 — Source / Secret scan
# =============================================================================
jobs:
  code-scan:
    name: "Trivy — Source & Secret Scan"
    runs-on: ubuntu-latest
    permissions:
      contents:        read
      security-events: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Trivy — filesystem (vuln + secret + misconfig)"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type:                 "fs"
          scan-ref:                  "."
          format:                    "sarif"
          output:                    "trivy-fs.sarif"
          severity:                  "CRITICAL,HIGH"
          exit-code:                 "0"
          scanners:                  "vuln,secret,misconfig"
          limit-severities-for-sarif: "true"

      - name: "Upload Trivy FS results → GitHub Security"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-fs.sarif"
          category:   "trivy-filesystem"

# =============================================================================
# Job 2 — Build images, scan them, push to ECR
# =============================================================================
  build-and-scan:
    name: "Build · Scan · Push"
    runs-on: ubuntu-latest
    needs: code-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token:        write
      contents:        write
      security-events: write

    outputs:
      image_tag: ${{ steps.tag.outputs.TAG }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      # ── OIDC auth ─────────────────────────────────────────────────────────
      - name: "Configure AWS credentials via OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_IAM_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: "GitHubActions-Build-${{ github.run_number }}"

      - name: "Login to Amazon ECR"
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Use the first 8 chars of the commit SHA as an immutable image tag
      - name: "Set image tag"
        id: tag
        run: echo "TAG=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      # ── Frontend (React + nginx) ──────────────────────────────────────────
      - name: "Build frontend image"
        env:
          REGISTRY:  ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          docker build \
            --no-cache \
            --build-arg REACT_APP_API_URL="${{ vars.API_URL || '' }}" \
            --tag "${REGISTRY}/ecommerce/frontend:${IMAGE_TAG}" \
            ./frontend

      - name: "Trivy — scan frontend image"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ steps.ecr-login.outputs.registry }}/ecommerce/frontend:${{ steps.tag.outputs.TAG }}"
          format:    "sarif"
          output:    "trivy-frontend-image.sarif"
          severity:  "CRITICAL,HIGH"
          exit-code: "0"
          limit-severities-for-sarif: "true"

      - name: "Upload frontend image scan → GitHub Security"
        if: success()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-frontend-image.sarif"
          category:   "trivy-frontend-image"

      - name: "Push frontend image to ECR"
        env:
          REGISTRY:  ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.TAG }}
        run: docker push "${REGISTRY}/ecommerce/frontend:${IMAGE_TAG}"

      # ── Catalog (Python / FastAPI) — this IS the backend API ─────────────
      - name: "Build catalog image"
        env:
          REGISTRY:  ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          docker build \
            --no-cache \
            --tag "${REGISTRY}/ecommerce/catalog:${IMAGE_TAG}" \
            ./catalog

      - name: "Trivy — scan catalog image"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ steps.ecr-login.outputs.registry }}/ecommerce/catalog:${{ steps.tag.outputs.TAG }}"
          format:    "sarif"
          output:    "trivy-catalog-image.sarif"
          severity:  "CRITICAL,HIGH"
          exit-code: "0"
          limit-severities-for-sarif: "true"

      - name: "Upload catalog image scan → GitHub Security"
        if: success()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-catalog-image.sarif"
          category:   "trivy-catalog-image"

      - name: "Push catalog image to ECR"
        env:
          REGISTRY:  ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.TAG }}
        run: docker push "${REGISTRY}/ecommerce/catalog:${IMAGE_TAG}"

