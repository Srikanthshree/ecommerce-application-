# =============================================================================
# Application CI/CD — ecommerce-app
#
# Authentication:  AWS OIDC — no static IAM keys anywhere.
# Security gates:  Trivy scans source, then each container image.
#                  ANY CRITICAL/HIGH finding blocks the pipeline.
# Flow:
#   1. code-scan      — Trivy FS scan (secrets + vulns + misconfigs)
#   2. build-and-scan — build images, Trivy image scan, push to ECR
#   3. deploy         — update EKS with zero-downtime rolling update
# =============================================================================

name: "Application CI/CD"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  id-token: write          # required for OIDC authentication to AWS
  security-events: write   # required for Trivy SARIF uploads

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION:       "us-east-1"
  EKS_CLUSTER_NAME: "ecommerce-eks"

# =============================================================================
# Job 1 — Source / Secret scan
# =============================================================================
jobs:
  code-scan:
    name: "Trivy — Source & Secret Scan"
    runs-on: ubuntu-latest
    permissions:
      contents:        read
      security-events: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Trivy — filesystem (vuln + secret + misconfig)"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type:                 "fs"
          scan-ref:                  "."
          format:                    "sarif"
          output:                    "trivy-fs.sarif"
          severity:                  "CRITICAL,HIGH"
          exit-code:                 "0"
          scanners:                  "vuln,secret,misconfig"
          limit-severities-for-sarif: "true"

      - name: "Upload Trivy FS results → GitHub Security"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-fs.sarif"
          category:   "trivy-filesystem"

# =============================================================================
# Job 2 — Build images, scan them, push to ECR
# =============================================================================
  build-and-scan:
    name: "Build · Scan · Push"
    runs-on: ubuntu-latest
    needs: code-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token:        write
      contents:        write
      security-events: write

    outputs:
      image_tag: ${{ steps.tag.outputs.TAG }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      # ── OIDC auth ─────────────────────────────────────────────────────────
      - name: "Configure AWS credentials via OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_IAM_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: "GitHubActions-Build-${{ github.run_number }}"

      - name: "Login to Amazon ECR"
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Use the first 8 chars of the commit SHA as an immutable image tag
      - name: "Set image tag"
        id: tag
        run: echo "TAG=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: "Debug runner environment"
        run: |
          echo "=== Debug runner: $(date) ==="
          echo "== whoami =="
          id || whoami || true
          echo "== pwd =="
          pwd
          echo "== ls repo root =="
          ls -la
          echo "== ls backend =="
          ls -la backend || true
          echo "== backend package.json =="
          cat backend/package.json || true
          echo "== docker version =="
          docker --version || true
          echo "== node version =="
          node --version || true
          echo "== npm version =="
          npm --version || true

      - name: "Prepare backend (install + build) (runner)"
        run: |
          set -euo pipefail
          echo "=== backend: pwd ==="
          cd backend
          echo "=== npm install ===" > backend-build.log
          npm install --ignore-scripts --legacy-peer-deps >> backend-build.log 2>&1
          echo "=== npm run build ===" >> backend-build.log
          npm run build >> backend-build.log 2>&1

      - name: "Upload backend build log"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-log
          path: backend/backend-build.log

      - name: "Show backend artifacts (runner)"
        run: |
          echo "=== backend directory listing ==="
          ls -la backend || true
          echo "=== backend/dist listing ==="
          ls -la backend/dist || true
          echo "=== backend/node_modules listing (first 20) ==="
          ls -la backend/node_modules | head -n 20 || true

      # ── Backend ──────────────────────────────────────────────────────────
      - name: "Build backend image"
        env:
          REGISTRY:  ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          set -o pipefail
          mkdir -p logs

          # Prefer the prebuilt target if CI prepared `backend/dist` and `backend/node_modules`.
          if [ -d backend/dist ]; then
            echo "Using Docker build target: production-prebuilt (prebuilt dist present)"
            TARGET_ARG="--target production-prebuilt"
          else
            echo "Using Docker build target: production (build inside image)"
            TARGET_ARG=""
          fi

          docker build --progress=plain --no-cache $TARGET_ARG --tag "${REGISTRY}/ecommerce/backend:${IMAGE_TAG}" ./backend 2>&1 | tee logs/docker-backend-build.log

      - name: "Upload docker backend build log"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-backend-build-log
          path: logs/docker-backend-build.log

      - name: "Trivy — scan backend image"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ steps.ecr-login.outputs.registry }}/ecommerce/backend:${{ steps.tag.outputs.TAG }}"
          format:    "sarif"
          output:    "trivy-backend-image.sarif"
          severity:  "CRITICAL,HIGH"
          exit-code: "0"
          limit-severities-for-sarif: "true"

      - name: "Upload backend image scan → GitHub Security"
        if: success()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-backend-image.sarif"
          category:   "trivy-backend-image"

      - name: "Push backend image to ECR"
        env:
          REGISTRY:  ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.TAG }}
        run: docker push "${REGISTRY}/ecommerce/backend:${IMAGE_TAG}"

      - name: "Prepare frontend (generate package-lock) (runner)"
        run: |
          set -euo pipefail
          echo "=== frontend: pwd ==="
          cd frontend
          echo "=== npm install --package-lock-only ==="
          npm install --package-lock-only --legacy-peer-deps


      # ── Frontend ─────────────────────────────────────────────────────────
      - name: "Build frontend image"
        env:
          REGISTRY:  ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          docker build \
            --no-cache \
            --build-arg REACT_APP_API_URL="${{ vars.API_URL || '' }}" \
            --tag "${REGISTRY}/ecommerce/frontend:${IMAGE_TAG}" \
            ./frontend

      - name: "Trivy — scan frontend image"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ steps.ecr-login.outputs.registry }}/ecommerce/frontend:${{ steps.tag.outputs.TAG }}"
          format:    "sarif"
          output:    "trivy-frontend-image.sarif"
          severity:  "CRITICAL,HIGH"
          exit-code: "0"
          limit-severities-for-sarif: "true"

      - name: "Upload frontend image scan → GitHub Security"
        if: success()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-frontend-image.sarif"
          category:   "trivy-frontend-image"

      - name: "Push frontend image to ECR"
        env:
          REGISTRY:  ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.TAG }}
        run: docker push "${REGISTRY}/ecommerce/frontend:${IMAGE_TAG}"

      # ── Catalog (Python / FastAPI) ────────────────────────────────────────
      - name: "Build catalog image"
        env:
          REGISTRY:  ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          docker build \
            --no-cache \
            --tag "${REGISTRY}/ecommerce/catalog:${IMAGE_TAG}" \
            ./catalog

      - name: "Trivy — scan catalog image"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ steps.ecr-login.outputs.registry }}/ecommerce/catalog:${{ steps.tag.outputs.TAG }}"
          format:    "sarif"
          output:    "trivy-catalog-image.sarif"
          severity:  "CRITICAL,HIGH"
          exit-code: "0"
          limit-severities-for-sarif: "true"

      - name: "Upload catalog image scan → GitHub Security"
        if: success()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-catalog-image.sarif"
          category:   "trivy-catalog-image"

      - name: "Push catalog image to ECR"
        env:
          REGISTRY:  ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.TAG }}
        run: docker push "${REGISTRY}/ecommerce/catalog:${IMAGE_TAG}"

# =============================================================================
# Job 3 — Deploy to EKS (production gate via GitHub Environment)
# =============================================================================
  deploy:
    name: "Deploy to EKS (production)"
    runs-on: ubuntu-latest
    needs: build-and-scan
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Configure AWS credentials via OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_IAM_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: "GitHubActions-Deploy-${{ github.run_number }}"

      - name: "Login to Amazon ECR"
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Update kubeconfig for the private EKS cluster.
      # The GitHub runner reaches the private API endpoint because the
      # aws-actions/configure-aws-credentials action adds the SigV4 token
      # required to call the private endpoint via the AWS API.
      - name: "Update kubeconfig"
        run: |
          aws eks update-kubeconfig \
            --region "${{ env.AWS_REGION }}" \
            --name   "${{ env.EKS_CLUSTER_NAME }}"

      # ── Create/update K8s Secret containing the Secrets Manager ARN ──────
      # The actual DB password is NOT stored here — only the ARN is.
      # The Node.js process calls Secrets Manager at startup to fetch creds.
      - name: "Ensure ecommerce namespace exists"
        run: |
          kubectl create namespace ecommerce --dry-run=client -o yaml | kubectl apply -f -

      - name: "Upsert backend-secrets K8s Secret"
        run: |
          kubectl create secret generic backend-secrets \
            --namespace ecommerce \
            --from-literal=db_secret_arn="${{ secrets.DB_SECRET_ARN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Substitute placeholders in manifests and deploy ───────────────────
      - name: "Deploy to Kubernetes"
        env:
          REGISTRY:      ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:     ${{ needs.build-and-scan.outputs.image_tag }}
          IRSA_ROLE_ARN: ${{ secrets.IRSA_ROLE_ARN }}
        run: |
          # Apply namespace + RBAC first
          kubectl apply -f k8s/namespace.yaml

          # Substitute image placeholders
          sed -i \
            "s|ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/ecommerce/backend:IMAGE_TAG|${REGISTRY}/ecommerce/backend:${IMAGE_TAG}|g" \
            k8s/backend-deployment.yaml

          sed -i \
            "s|ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/ecommerce/frontend:IMAGE_TAG|${REGISTRY}/ecommerce/frontend:${IMAGE_TAG}|g" \
            k8s/frontend-deployment.yaml

          sed -i \
            "s|ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/ecommerce/catalog:IMAGE_TAG|${REGISTRY}/ecommerce/catalog:${IMAGE_TAG}|g" \
            k8s/catalog-deployment.yaml

          # Substitute IRSA role ARN in ServiceAccount annotations
          sed -i "s|IRSA_ROLE_ARN|${IRSA_ROLE_ARN}|g" k8s/backend-service.yaml
          sed -i "s|IRSA_ROLE_ARN|${IRSA_ROLE_ARN}|g" k8s/catalog-deployment.yaml

          # Apply all manifests
          # Apply ServiceAccount + ConfigMap first to avoid race where the
          # Deployment is created before the ServiceAccount exists.
          kubectl apply -f k8s/backend-service.yaml || true

          # Wait briefly for the ServiceAccount to be visible to the API server
          for i in $(seq 1 30); do
            if kubectl get sa backend -n ecommerce >/dev/null 2>&1; then
              echo "ServiceAccount 'backend' exists." && break
            fi
            echo "Waiting for ServiceAccount 'backend'... ($i)";
            sleep 1
          done

          # Apply remaining manifests
          kubectl apply -f k8s/

      # ── Wait for rollout to complete ──────────────────────────────────────
      - name: "Wait for backend rollout"
        run: |
          kubectl rollout status deployment/backend  \
            --namespace ecommerce \
            --timeout   30s

      - name: "Debug backend pods on failure"
        if: failure()
        run: |
          echo "=== Debug: get pods ==="
          kubectl get pods -n ecommerce -o wide || true

          echo "=== Debug: describe backend deployment ==="
          kubectl describe deployment backend -n ecommerce || true

          echo "=== Debug: describe backend pods ==="
          for p in $(kubectl get pods -n ecommerce -l app=backend -o name); do
            kubectl describe "$p" -n ecommerce || true
          done
          echo "=== Debug: backend secret (db_secret_arn) ==="
          kubectl get secret backend-secrets -n ecommerce -o jsonpath='{.data.db_secret_arn}' | base64 --decode || true

          echo "=== Debug: recent logs (last 200 lines) from backend pods ==="
          for p in $(kubectl get pods -n ecommerce -l app=backend -o name); do
            kubectl logs "$p" -n ecommerce --all-containers --tail=200 || true
          done

          echo "=== Debug: events ==="
          kubectl get events -n ecommerce --sort-by='.metadata.creationTimestamp' || true

      - name: "Wait for frontend rollout"
        run: |
          kubectl rollout status deployment/frontend \
            --namespace ecommerce \
            --timeout   30s

      - name: "Wait for catalog rollout"
        run: |
          kubectl rollout status deployment/catalog \
            --namespace ecommerce \
            --timeout   30s

      # ── Post-deploy verification ──────────────────────────────────────────
      - name: "Verify running pods"
        run: |
          echo "=== Backend pods ==="
          kubectl get pods -n ecommerce -l app=backend  -o wide
          echo "=== Frontend pods ==="
          kubectl get pods -n ecommerce -l app=frontend -o wide
          echo "=== Catalog pods ==="
          kubectl get pods -n ecommerce -l app=catalog  -o wide
